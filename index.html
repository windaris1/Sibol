<style>
#sibaltv-chat{display:flex;flex-direction:column;height:calc(100vh - 280px);background:#0a0f1a;padding:12px;font-family:system-ui,sans-serif}
#chat-messages{flex:1;overflow-y:auto;padding:0 4px}
#chat-messages .msg{background:#1a1f2e;border-radius:8px;padding:8px 12px;margin-bottom:8px;animation:fadeIn .2s}
#chat-messages .msg b{color:#22c55e;font-size:13px;margin-right:8px}
#chat-messages .msg span{color:#6b7280;font-size:10px}
#chat-messages .msg p{margin:4px 0 0 0;color:#e5e7eb;font-size:14px;word-break:break-word}
.chat-input-wrap{border-top:1px solid #2d3748;padding-top:12px}
#chat-name{width:100%;background:#1a1f2e;border:1px solid #2d3748;color:#f3f4f6;border-radius:6px;padding:8px 12px;margin-bottom:8px;box-sizing:border-box}
.chat-row{display:flex;gap:8px}
#chat-msg{flex:1;background:#1a1f2e;border:1px solid #2d3748;color:#f3f4f6;border-radius:6px;padding:10px 12px}
#chat-send{background:#3b82f6;color:#fff;border:none;border-radius:6px;padding:0 16px;font-weight:600;cursor:pointer}
#chat-send:active{transform:scale(0.95)}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
</style>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
// CONFIG LU UDAH GUE MASUKIN
const firebaseConfig = {
  apiKey: "AIzaSyDkZDZfkueidOiRBlhPBUSXhhBJICGj-C4",
  authDomain: "sibaltv.firebaseapp.com",
  databaseURL: "https://sibaltv-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "sibaltv",
  storageBucket: "sibaltv.firebasestorage.app",
  messagingSenderId: "625753841479",
  appId: "1:625753841479:web:e6281e31fdcc5deddd3662"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database().ref('sibaltv_chat');

const nameInput = document.getElementById('chat-name');
const msgInput = document.getElementById('chat-msg');
const sendBtn = document.getElementById('chat-send');
const msgBox = document.getElementById('chat-messages');

nameInput.value = localStorage.getItem('sibaltv_name') || '';
nameInput.onchange = () => localStorage.setItem('sibaltv_name', nameInput.value);

function sendMsg() {
    const name = nameInput.value.trim() || 'Anon';
    const msg = msgInput.value.trim();
    if(!msg) return;
    if(msg.length > 300) return alert('Pesan max 300 karakter');
    db.push({ name, msg, time: Date.now() });
    msgInput.value = '';
}
sendBtn.onclick = sendMsg;
msgInput.onkeyup = e => e.key === 'Enter' && sendMsg();

db.limitToLast(50).on('child_added', snap => {
    const d = snap.val();
    const time = new Date(d.time).toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
    msgBox.innerHTML += `<div class="msg"><b>${d.name}</b><span>${time}</span><p>${d.msg}</p></div>`;
    msgBox.scrollTop = msgBox.scrollHeight;
});

// Auto hapus chat > 7 hari biar ga penuh
db.orderByChild('time').endAt(Date.now() - 604800000).once('value', s => s.forEach(c => c.ref.remove()));
</script>
