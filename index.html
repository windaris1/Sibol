<body>

<div class="main-layout">
  <!-- SIDEBAR KIRI: PLAYER -->
  <div class="left-sidebar">
    <div class="player-wrap">
      <div class="video-container">
        <iframe 
          id="playerFrame"
          src=""
          frameborder="0"
          allowfullscreen
          allow="autoplay; encrypted-media; fullscreen"
          sandbox="allow-scripts allow-same-origin allow-forms allow-presentation"
        ></iframe>
        
        <div id="playerPoster" class="player-poster">
          <img src="https://sibaltv.pages.dev/sibco.jpg" alt="Sibal TV">
          <div>Pilih Pertandingan Dulu...</div>
        </div>
         
        <div class="scoreboard" id="scoreboard">Pilih match dulu</div>
        <div class="live-badge">● LIVE</div>
      </div>
      <div class="channel-select-bar" id="channelSelectBar" style="display:none;"></div>
    </div>
  </div>

  <!-- SIDEBAR KANAN: MENU + CHAT -->
  <div class="right-sidebar">
    <div class="league-bar-wrapper">
      <button class="scroll-btn left" id="scrollLeft">‹</button>
      <div class="league-bar" id="leagueBar"></div>
      <button class="scroll-btn right" id="scrollRight">›</button>
    </div>

<div class="download-bar">
  <div class="download-text">
    DOWNLOAD APK SIBAL TV <span class="link">(KLIK DISINI)</span>
  </div>
  <button class="reload-btn">
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="23 4 23 10 17 10"></polyline>
      <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
    </svg>
  </button>
</div>
      
    <div class="chat-wrapper">
      <div class="chat-box" id="chatBox"></div>
    </div>
  </div>
</div>

<div class="match-popup-overlay" id="popupOverlay"></div>
<div class="match-popup" id="matchPopup">
  <div class="popup-header"><span id="popupTitle">Pilih Pertandingan</span><span id="popupClose">✕</span></div>
  <div class="popup-list" id="popupList"></div>
</div>

<div class="chat-input-area">
  <input type="text" id="chat-name" placeholder="Nama" maxlength="12">
  <input type="text" id="chat-msg" placeholder="Ketik pesan...">
   <button id="chat-send">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
      <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
    </svg>
  </button>

</div>

<!-- TV MODAL -->
<div class="tv-modal" id="tvModal">
  <div class="tv-modal-content">
    <div class="tv-modal-header">
      <span>Pilih Channel TV</span>
      <button class="close-btn" id="tvClose">✕</button>
    </div>
    <div class="tv-grid" id="tvGrid"></div>
  </div>
</div>
