<style>
#sibaltv-chat{display:flex;flex-direction:column;height:calc(100vh - 280px);background:#0f1419;padding:0;font-family:system-ui,sans-serif}
#chat-messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
#chat-messages::-webkit-scrollbar{width:4px}
#chat-messages::-webkit-scrollbar-thumb{background:#2d3748;border-radius:4px}

.msg{max-width:85%;display:flex;gap:8px;animation:slideUp.25s ease}
.msg.me{margin-left:auto;flex-direction:row-reverse}
.avatar{width:32px;height:32px;border-radius:50%;background:#3b82f6;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:14px;flex-shrink:0}
.msg.me.avatar{background:#22c55e}
.bubble{background:#1a1f2e;border-radius:12px;padding:8px 12px;position:relative}
.msg.me.bubble{background:#2563eb;border-bottom-right-radius:4px}
.msg:not(.me).bubble{border-bottom-left-radius:4px}
.bubble.name{color:#22c55e;font-size:12px;font-weight:600;margin-bottom:2px;display:flex;align-items:center;gap:4px}
.badge-admin{background:#f59e0b;color:#000;font-size:9px;padding:1px 4px;border-radius:3px;font-weight:700}
.msg.me.bubble.name{display:none}
.bubble.text{color:#e5e7eb;font-size:14px;line-height:1.4;word-break:break-word}
.bubble.time{color:#6b7280;font-size:10px;text-align:right;margin-top:4px}
.msg.me.bubble.time{color:#bfdbfe}

.chat-input-wrap{background:#1a1f2e;border-top:1px solid #2d3748;padding:12px;position:relative}
#chat-name{width:100%;background:#0f1419;border:1px solid #2d3748;color:#f3f4f6;border-radius:8px;padding:8px 12px;margin-bottom:8px;box-sizing:border-box;font-size:14px}
#chat-name:focus{outline:none;border-color:#3b82f6}
.chat-row{display:flex;gap:8px;align-items:flex-end}
#chat-emoji{background:#0f1419;border:1px solid #2d3748;color:#f3f4f6;border-radius:50%;width:40px;height:40px;font-size:18px;cursor:pointer;flex-shrink:0}
#chat-msg{flex:1;background:#0f1419;border:1px solid #2d3748;color:#f3f4f6;border-radius:20px;padding:10px 16px;font-size:14px;resize:none;max-height:100px}
#chat-msg:focus{outline:none;border-color:#3b82f6}
#chat-send{background:#3b82f6;color:#fff;border:none;border-radius:50%;width:40px;height:40px;font-size:18px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
#chat-send:active{transform:scale(0.9)}

#emoji-picker{position:absolute;bottom:60px;left:12px;background:#1a1f2e;border:1px solid #2d3748;border-radius:12px;padding:8px;display:none;grid-template-columns:repeat(8,1fr);gap:4px;z-index:10}
#emoji-picker.show{display:grid}
#emoji-picker span{cursor:pointer;font-size:20px;padding:4px;border-radius:6px;text-align:center}
#emoji-picker span:hover{background:#2d3748}

@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>

<!-- HTML lu tambahin tombol emoji di chat-row -->
<script>
// Ganti bagian chat-input-wrap jadi gini:
document.querySelector('.chat-input-wrap').innerHTML = `

    </div>
    <div id="emoji-picker"></div>
`;

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyDkZDZfkueidOiRBlhPBUSXhhBJICGj-C4",
  authDomain: "sibaltv.firebaseapp.com",
  databaseURL: "https://sibaltv-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "sibaltv",
  storageBucket: "sibaltv.firebasestorage.app",
  messagingSenderId: "625753841479",
  appId: "1:625753841479:web:e6281e31fdcc5deddd3662"
};

// GANTI "Admin" SESUAI NAMA LU BIAR DAPET BADGE
const ADMIN_NAMES = ["Admin", "SibalTV", "Test"]; 

firebase.initializeApp(firebaseConfig);
const db = firebase.database().ref('sibaltv_chat');

const nameInput = document.getElementById('chat-name');
const msgInput = document.getElementById('chat-msg');
const sendBtn = document.getElementById('chat-send');
const emojiBtn = document.getElementById('chat-emoji');
const emojiPicker = document.getElementById('emoji-picker');
const msgBox = document.getElementById('chat-messages');

const emojis = ['😀','😂','😍','🔥','👍','🙏','😭','😡','⚽','🎉','💯','❤️','😎','🤔','👏','💀'];
emojiPicker.innerHTML = emojis.map(e => `<span>${e}</span>`).join('');

nameInput.value = localStorage.getItem('sibaltv_name') || '';
nameInput.onchange = () => localStorage.setItem('sibaltv_name', nameInput.value);

emojiBtn.onclick = () => emojiPicker.classList.toggle('show');
emojiPicker.onclick = e => {
  if(e.target.tagName === 'SPAN') {
    msgInput.value += e.target.textContent;
    emojiPicker.classList.remove('show');
    msgInput.focus();
  }
};
document.onclick = e => {
  if(!e.target.closest('#chat-emoji') &&!e.target.closest('#emoji-picker')) {
    emojiPicker.classList.remove('show');
  }
};

function getInitials(name) {
  return name.split(' ').map(w => w[0]).join('').substring(0,2).toUpperCase() || '?';
}

function sendMsg() {
    const name = nameInput.value.trim() || 'Anon';
    const msg = msgInput.value.trim();
    if(!msg) return;
    if(msg.length > 300) return alert('Pesan max 300 karakter');
    db.push({ name, msg, time: Date.now() });
    msgInput.value = '';
}
sendBtn.onclick = sendMsg;
msgInput.onkeyup = e => {
  if(e.key === 'Enter' &&!e.shiftKey) {
    e.preventDefault();
    sendMsg();
  }
};

db.limitToLast(50).on('child_added', snap => {
    const d = snap.val();
    const myName = localStorage.getItem('sibaltv_name') || 'Anon';
    const isMe = d.name === myName;
    const isAdmin = ADMIN_NAMES.includes(d.name);
    const time = new Date(d.time).toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
    
    msgBox.innerHTML += `
      <div class="msg ${isMe? 'me' : ''}">
        <div class="avatar">${getInitials(d.name)}</div>
        <div class="bubble">
          ${!isMe? `<div class="name">${d.name}${isAdmin?'<span class="badge-admin">ADMIN</span>':''}</div>` : ''}
          <div class="text">${d.msg}</div>
          <div class="time">${time}</div>
        </div>
      </div>`;
    msgBox.scrollTop = msgBox.scrollHeight;
});

db.orderByChild('time').endAt(Date.now() - 604800000).once('value', s => s.forEach(c => c.ref.remove()));
</script>
