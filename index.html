<div id="sibaltv-chat">

        <div class="chat-row">
            <button id="chat-emoji" title="Emoji"><i class="fa-regular fa-face-smile"></i></button>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyDkZDZfkueidOiRBlhPBUSXhhBJICGj-C4",
  authDomain: "sibaltv.firebaseapp.com",
  databaseURL: "https://sibaltv-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "sibaltv",
  storageBucket: "sibaltv.firebasestorage.app",
  messagingSenderId: "625753841479",
  appId: "1:625753841479:web:e6281e31fdcc5deddd3662"
};

const ADMIN_NAMES = ["Admin", "SibalTV"];
const USER_COLORS = ['#14b8a6','#22c55e','#eab308','#ef4444','#a855f7','#ec4899','#3b82f6','#f97316'];

firebase.initializeApp(firebaseConfig);
const db = firebase.database().ref('sibaltv_chat');

const msgInput = document.getElementById('chat-msg');
const sendBtn = document.getElementById('chat-send');
const emojiBtn = document.getElementById('chat-emoji');
const msgBox = document.getElementById('chat-messages');

function getInitials(name) {
  return name.split(' ').map(w => w[0]).join('').substring(0,2).toUpperCase() || '?';
}

function getUserColor(name) {
  let hash = 0;
  for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
  return USER_COLORS[Math.abs(hash) % USER_COLORS.length];
}

function sendMsg() {
    let name = localStorage.getItem('sibaltv_name');
    if(!name) {
      name = prompt('Masukin nama kamu dulu:') || 'Anon';
      localStorage.setItem('sibaltv_name', name);
    }
    const msg = msgInput.value.trim();
    if(!msg) return;
    if(msg.length > 300) return alert('Pesan max 300 karakter');
    sendBtn.disabled = true;
    db.push({ name, msg, time: Date.now() }).then(() => {
      msgInput.value = '';
      sendBtn.disabled = false;
      msgInput.focus();
    });
}

sendBtn.onclick = sendMsg;

// GANTI BAGIAN INI - mulai dari emojiBtn.onclick
let pickerBox;
emojiBtn.onclick = function(e){
  e.stopPropagation();
  if(pickerBox){
    pickerBox.remove();
    pickerBox = null;
    return;
  }
  
  const emojiGroups = {
    'Reaksi': ['😂','🤣','😭','😱','😡','🤯','🔥','💯','❤️','👍','👎','👏','🙏','🎉','😎','🤔','😍','💀','👀','💪'],
    'Bendera': ['🇮🇩','🇧🇷','🇦🇷','🇪🇸','🇩🇪','🇫🇷','🇮🇹','🇵🇹','🇳🇱','🇯🇵','🇰🇷','🇸🇦','🇺🇸','🇬🇧','🇲🇾','🇹🇭','🇻🇳','🇲🇦'],
    'Lainnya': ['✨','⭐️','🚀','💣','😤','🤩','🥶','🥵','🤝','👌','💔','💙','💛','💚','🖤','🤡','💦','🗣️']
  };

  pickerBox = document.createElement('div');
  pickerBox.className = 'emoji-picker';
  
  Object.entries(emojiGroups).forEach(function([title, emojis]){
    const groupTitle = document.createElement('div');
    groupTitle.textContent = title;
    groupTitle.style.cssText = 'font-size:11px; color:#9ca3af; padding:6px 6px 2px; width:100%; font-weight:600;';
    pickerBox.append(groupTitle);
    
    const emojiWrap = document.createElement('div');
    emojiWrap.style.cssText = 'display:flex; flex-wrap:wrap; gap:4px; padding:0 6px 6px;';
    
    emojis.forEach(function(em){
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.textContent = em;
      btn.onclick = function(ev){
        ev.preventDefault();
        msgInput.value += em + ' ';
        pickerBox.remove();
        pickerBox = null;
        msgInput.focus();
      };
      emojiWrap.append(btn);
    });
    pickerBox.append(emojiWrap);
  });
  
  document.body.append(pickerBox);
};

// Klik di luar popup = tutup
document.addEventListener('click', function(){
  if(pickerBox){
    pickerBox.remove();
    pickerBox = null;
  }
});
// SAMPAI SINI

msgInput.onkeyup = e => {
  if(e.key === 'Enter') {
    e.preventDefault();
    sendMsg();
  }
};

db.orderByChild('time').limitToLast(100).on('child_added', snap => {
    const d = snap.val();
    const isAdmin = ADMIN_NAMES.includes(d.name);
    const time = new Date(d.time).toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'}) + ' WIB';
    const avatarColor = isAdmin? 'var(--sibal-admin)' : getUserColor(d.name);

    const chatHtml = `
      <div class="chat-item ${isAdmin?'admin':''}">
        <div class="chat-avatar" style="background:${avatarColor}">${getInitials(d.name)}</div>
        <div class="chat-body">
          <div class="chat-meta">
            <span class="chat-name" style="color:${avatarColor}">${d.name}</span>
            <span class="chat-time">${time}</span>
          </div>
          <div class="chat-text">${d.msg}</div>
        </div>
      </div>`;

    msgBox.insertAdjacentHTML('afterbegin', chatHtml);
    msgBox.scrollTop = 0;
});

db.orderByChild('time').endAt(Date.now() - 259200000).once('value', s => s.forEach(c => c.ref.remove()));

// FIX KEYBOARD NUTUPIN INPUT
if(window.visualViewport){
  visualViewport.addEventListener('resize', () => {
    document.getElementById('sibaltv-chat').style.height = visualViewport.height + 'px';
  });
}
// Balikin height pas keyboard close
msgInput.addEventListener('blur', ()=>{
  document.getElementById('sibaltv-chat').style.height = '';
});
</script>
