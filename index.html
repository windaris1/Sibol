<style>
#sibaltv-chat{display:flex;flex-direction:column;height:calc(100vh - 280px);background:#0a0a0a;font-family:Roboto,system-ui,sans-serif}
#chat-messages{flex:1;overflow-y:auto;padding:8px 12px;background:#0a0a0a}

#chat-messages::-webkit-scrollbar-track{background:#1a1a1a}

.msg{font-size:13px;line-height:1.5;margin-bottom:4px;word-break:break-word;animation:fadeIn.15s}
.msg.name{font-weight:500;margin-right:6px}
.msg.admin.name{color:#f59e0b !important}
.msg.text{color:#e5e5e5}
.msg.time{color:#737373;font-size:11px;margin-left:6px;float:right}

.chat-input-wrap{background:#1a1a1a;border-top:1px solid #262626;padding:8px 12px}
#chat-name{width:100%;background:#0a0a0a;border:1px solid #333;color:#fff;border-radius:4px;padding:6px 10px;margin-bottom:8px;font-size:13px;box-sizing:border-box}
#chat-name:focus{outline:none;border-color:#3b82f6}
.chat-row{display:flex;gap:8px;align-items:center}
#chat-msg{flex:1;background:#0a0a0a;border:1px solid #333;color:#fff;border-radius:18px;padding:8px 14px;font-size:13px}
#chat-msg:focus{outline:none;border-color:#3b82f6}
#chat-msg::placeholder{color:#737373}
#chat-send{background:#3b82f6;color:#fff;border:none;border-radius:50%;width:32px;height:32px;font-size:14px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center}
#chat-send:disabled{opacity:0.4;cursor:not-allowed}
#chat-send:active{transform:scale(0.9)}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
</style>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyDkZDZfkueidOiRBlhPBUSXhhBJICGj-C4",
  authDomain: "sibaltv.firebaseapp.com",
  databaseURL: "https://sibaltv-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "sibaltv",
  storageBucket: "sibaltv.firebasestorage.app",
  messagingSenderId: "625753841479",
  appId: "1:625753841479:web:e6281e31fdcc5deddd3662"
};

// NAMA ADMIN: bakal warna kuning + bold
const ADMIN_NAMES = ["Admin", "SibalTV", "Test"]; 
// WARNA RANDOM BUAT USER BIASA ALA VIDIO
const USER_COLORS = ['#3b82f6','#22c55e','#eab308','#ef4444','#a855f7','#ec4899','#14b8a6','#f97316'];

firebase.initializeApp(firebaseConfig);
const db = firebase.database().ref('sibaltv_chat');

const nameInput = document.getElementById('chat-name');
const msgInput = document.getElementById('chat-msg');
const sendBtn = document.getElementById('chat-send');
const msgBox = document.getElementById('chat-messages');

nameInput.value = localStorage.getItem('sibaltv_name') || '';
nameInput.onchange = () => localStorage.setItem('sibaltv_name', nameInput.value);

// Generate warna konsisten berdasarkan nama
function getUserColor(name) {
  let hash = 0;
  for (let i = 0; i < name.length; i++) {
    hash = name.charCodeAt(i) + ((hash << 5) - hash);
  }
  return USER_COLORS[Math.abs(hash) % USER_COLORS.length];
}

function sendMsg() {
    const name = nameInput.value.trim() || 'Anon';
    const msg = msgInput.value.trim();
    if(!msg) return;
    if(msg.length > 300) return alert('Pesan max 300 karakter');
    sendBtn.disabled = true;
    db.push({ name, msg, time: Date.now() }).then(() => {
      msgInput.value = '';
      sendBtn.disabled = false;
    });
}
sendBtn.onclick = sendMsg;
msgInput.onkeyup = e => {
  if(e.key === 'Enter' &&!e.shiftKey) {
    e.preventDefault();
    sendMsg();
  }
};

db.limitToLast(100).on('child_added', snap => {
    const d = snap.val();
    const isAdmin = ADMIN_NAMES.includes(d.name);
    const time = new Date(d.time).toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
    const nameColor = isAdmin ? '#f59e0b' : getUserColor(d.name);
    
    msgBox.innerHTML += `
      <div class="msg">
        <span class="name ${isAdmin?'admin':''}" style="color:${nameColor}">${d.name}</span>
        <span class="text">${d.msg}</span>
        <span class="time">${time}</span>
      </div>`;
    msgBox.scrollTop = msgBox.scrollHeight;
});

// Auto hapus chat > 3 hari biar enteng
db.orderByChild('time').endAt(Date.now() - 259200000).once('value', s => s.forEach(c => c.ref.remove()));
</script>
