<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">

  <title>Sibal TV</title>

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#15151f">
<link rel="apple-touch-icon" href="/icoxs.png">

  <link rel="stylesheet" href="fsindex.css">
</head>
<body>

<div class="main-layout">
  <!-- SIDEBAR KIRI: PLAYER -->
  <div class="left-sidebar">
    <div class="player-wrap">
      <div class="video-container">
        <iframe 
          id="playerFrame"
          src=""
          frameborder="0"
          allowfullscreen
          allow="autoplay; encrypted-media; fullscreen"
          sandbox="allow-scripts allow-same-origin allow-forms allow-presentation"
        ></iframe>
        
        <div id="playerPoster" class="player-poster">
          <img src="https://sibaltv.pages.dev/sibco.jpg" alt="Sibal TV">
          <div>Pilih Pertandingan Dulu...</div>
        </div>
         
        <div class="scoreboard" id="scoreboard">Pilih match dulu</div>
        <div class="live-badge">● LIVE</div>
      </div>
      <div class="channel-select-bar" id="channelSelectBar" style="display:none;"></div>
    </div>
  </div>

  <!-- SIDEBAR KANAN: MENU + CHAT -->
  <div class="right-sidebar">
    <div class="league-bar-wrapper">
      <button class="scroll-btn left" id="scrollLeft">‹</button>
      <div class="league-bar" id="leagueBar"></div>
      <button class="scroll-btn right" id="scrollRight">›</button>
    </div>

    <div class="notice"><b>Download Aplikasi Sibal TV (Apk) Gratis</b><b><a href=""> KLIK DINISI </a></b></div>
      
    <div class="chat-wrapper">
      <div class="chat-box" id="chatBox"></div>
    </div>
  </div>
</div>

<div class="match-popup-overlay" id="popupOverlay"></div>
<div class="match-popup" id="matchPopup">
  <div class="popup-header"><span id="popupTitle">Pilih Pertandingan</span><span id="popupClose">✕</span></div>
  <div class="popup-list" id="popupList"></div>
</div>

<div class="chat-input-area">
  <input type="text" id="chat-name" placeholder="Nama" maxlength="12">
  <input type="text" id="chat-msg" placeholder="Ketik pesan...">
  <button id="chat-send">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
      <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
    </svg>
  </button>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script src="fsindex.js"></script>

</body>
</html>
