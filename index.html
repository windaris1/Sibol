<style>
:root{
  --sibal-bg:#1a1f2e;
  --sibal-surface:#11141c;
  --sibal-border:#2a3040;
  --sibal-primary:#1e40af;
  --sibal-text:#e5e5e5;
  --sibal-text-dim:#8a91a8;
  --sibal-admin:#f59e0b;
}

#sibaltv-chat{
  font-family:Roboto,system-ui,sans-serif;
  background:var(--sibal-bg);
  height:500px;
  display:flex;
  flex-direction:column;
  overflow:hidden;
  border:1px solid var(--sibal-border);
  border-radius:8px;
}

#chat-messages{
  flex:1;
  overflow-y:auto;
  overflow-x:hidden;
  padding:8px 12px;
  background:var(--sibal-bg);
  -webkit-overflow-scrolling:touch;
  display:flex;
  flex-direction:column-reverse;
}
#chat-messages::-webkit-scrollbar{width:6px}
#chat-messages::-webkit-scrollbar-thumb{background:#333;border-radius:3px}

.chat-item{
  display:flex;
  gap:8px;
  margin-bottom:8px;
  align-items:flex-start;
  animation:fadeIn.15s ease
}
.chat-avatar{
  width:28px;
  height:28px;
  border-radius:50%;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:600;
  font-size:12px;
  flex-shrink:0;
  margin-top:2px
}
.chat-body{flex:1;min-width:0}
.chat-meta{
  display:flex;
  align-items:baseline;
  justify-content:space-between;
  width:100%;
  margin-bottom:2px
}
.chat-time{
  color:var(--sibal-text-dim);
  font-size:11px;
  white-space:nowrap;
  order:2
}
.chat-name{
  font-weight:500;
  font-size:13px;
  order:1
}
.chat-item.admin.chat-name{color:var(--sibal-admin)!important}
.chat-text{
  color:var(--sibal-text);
  font-size:13px;
  line-height:1.4;
  word-break:break-word
}

/* INPUT + SVG ICON */
.chat-input-wrap{
  background:var(--sibal-surface);
  border-top:1px solid var(--sibal-border);
  padding:8px 12px;
  flex-shrink:0;
}
.chat-row{
  display:flex;
  gap:4px;
  align-items:center;
  position:relative;
}
.chat-row button{
  background:transparent;
  border:none;
  color:var(--sibal-text-dim)!important;
  cursor:pointer;
  flex-shrink:0;
  padding:6px;
  line-height:1;
  transition:.15s;
  border-radius:50%;
  width:34px;
  height:34px;
  display:flex;
  align-items:center;
  justify-content:center;
}
.chat-row button svg{
  width:20px!important;
  height:20px!important;
  display:block!important;
  pointer-events:none;
}
.chat-row button:hover{
  color:var(--sibal-primary)!important;
  background:#1e40af20;
}
.chat-row button:active{
  transform:scale(0.9);
}
#chat-send{
  color:var(--sibal-primary)!important;
}
#chat-send svg{
  fill:currentColor!important;
  stroke:none!important;
}
#chat-send:hover{
  background:#1e40af30;
}
#chat-send:disabled{
  opacity:0.4;
  cursor:not-allowed;
  background:transparent;
}

#chat-msg{
  flex:1;
  background:var(--sibal-bg);
  border:1px solid var(--sibal-border);
  color:var(--sibal-text);
  border-radius:18px;
  padding:12px 14px;
  font-size:16px;
  min-width:0;
  font-family:inherit;
  margin:0 4px;
}
#chat-msg:focus{
  outline:none;
  border-color:var(--sibal-primary)
}
#chat-msg::placeholder{color:var(--sibal-text-dim)}

/* EMOJI PICKER */
.emoji-picker{
  position:absolute;
  bottom:50px;
  left:0;
  background:var(--sibal-surface);
  border:1px solid var(--sibal-border);
  border-radius:8px;
  padding:8px;
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:4px;
  z-index:9999;
  box-shadow:0 4px 12px #00000040;
}
.emoji-picker button{
  background:none;
  border:none;
  font-size:22px;
  cursor:pointer;
  padding:4px;
  border-radius:4px;
  width:32px;
  height:32px;
}
.emoji-picker button:hover{
  background:#1e40af30;
}

@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}

@media (max-width:900px){
  #sibaltv-chat{height:400px}
  #chat-msg{font-size:16px;padding:10px 12px}
 .chat-row button{width:32px;height:32px}
 .chat-row button svg{width:18px!important;height:18px!important}
}
</style>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyDkZDZfkueidOiRBlhPBUSXhhBJICGj-C4",
  authDomain: "sibaltv.firebaseapp.com",
  databaseURL: "https://sibaltv-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "sibaltv",
  storageBucket: "sibaltv.firebasestorage.app",
  messagingSenderId: "625753841479",
  appId: "1:625753841479:web:e6281e31fdcc5deddd3662"
};

const ADMIN_NAMES = ["Admin", "SibalTV"];
const USER_COLORS = ['#14b8a6','#22c55e','#eab308','#ef4444','#a855f7','#ec4899','#3b82f6','#f97316'];

if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);
const db = firebase.database().ref('sibaltv_chat');

const msgInput = document.getElementById('chat-msg');
const sendBtn = document.getElementById('chat-send');
const emojiBtn = document.getElementById('chat-emoji');
const gifBtn = document.getElementById('chat-gif');
const imageBtn = document.getElementById('chat-image');
const msgBox = document.getElementById('chat-messages');
const chatRow = document.querySelector('.chat-row');

function getInitials(name) {
  return name.split(' ').map(w => w[0]).join('').substring(0,2).toUpperCase() || '?';
}

function getUserColor(name) {
  let hash = 0;
  for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
  return USER_COLORS[Math.abs(hash) % USER_COLORS.length];
}

function sendMsg() {
    let name = localStorage.getItem('sibaltv_name');
    if(!name) {
      name = prompt('Masukin nama kamu dulu:') || 'Anon';
      localStorage.setItem('sibaltv_name', name);
    }
    const msg = msgInput.value.trim();
    if(!msg) return;
    if(msg.length > 300) return alert('Pesan max 300 karakter');
    sendBtn.disabled = true;
    db.push({ name, msg, time: Date.now() }).then(() => {
      msgInput.value = '';
      sendBtn.disabled = false;
      msgInput.focus();
    }).catch(e => {
      alert('Gagal kirim: ' + e.message);
      sendBtn.disabled = false;
    });
}

// EMOJI PICKER
let pickerBox;
emojiBtn.onclick = (e) => {
  e.stopPropagation();
  if(pickerBox){
    pickerBox.remove();
    pickerBox = null;
    return;
  }
  const emojis = ['😀','😂','😍','😭','😡','👍','🔥','❤️','😎','🤔','😱','🙏','💯','✅','❌','😴','🤣','😊','🙄','👌'];
  pickerBox = document.createElement('div');
  pickerBox.className = 'emoji-picker';
  emojis.forEach(e => {
    const btn = document.createElement('button');
    btn.textContent = e;
    btn.onclick = () => {
      msgInput.value += e;
      pickerBox.remove();
      pickerBox = null;
      msgInput.focus();
    };
    pickerBox.append(btn);
  });
  chatRow.append(pickerBox);
};

document.addEventListener('click', (e) => {
  if(pickerBox &&!emojiBtn.contains(e.target) &&!pickerBox.contains(e.target)){
    pickerBox.remove();
    pickerBox = null;
  }
});

gifBtn.onclick = () => alert('Fitur GIF nyusul ya');
imageBtn.onclick = () => alert('Upload foto nyusul ya');
sendBtn.onclick = sendMsg;

msgInput.onkeyup = e => {
  if(e.key === 'Enter') {
    e.preventDefault();
    sendMsg();
  }
};

// LOAD CHAT
db.orderByChild('time').limitToLast(100).on('child_added', snap => {
    const d = snap.val();
    if(!d) return;
    const isAdmin = ADMIN_NAMES.includes(d.name);
    const time = new Date(d.time).toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'}) + ' WIB';
    const avatarColor = isAdmin? 'var(--sibal-admin)' : getUserColor(d.name);

    const chatHtml = `
      <div class="chat-item ${isAdmin?'admin':''}">
        <div class="chat-avatar" style="background:${avatarColor}">${getInitials(d.name)}</div>
        <div class="chat-body">
          <div class="chat-meta">
            <span class="chat-name" style="color:${avatarColor}">${d.name}</span>
            <span class="chat-time">${time}</span>
          </div>
          <div class="chat-text">${d.msg}</div>
        </div>
      </div>`;

    msgBox.insertAdjacentHTML('afterbegin', chatHtml);
});

// HAPUS PESAN > 3 HARI
db.orderByChild('time').endAt(Date.now() - 259200000).once('value', s => s.forEach(c => c.ref.remove()));
</script>
